# Namespace-scoped RBAC + NetworkPolicy template for production.
#
# The default deploy/leancd.yaml grants leancd a broad ClusterRole via a
# ClusterRoleBinding, because leancd can apply arbitrary kinds (including CRDs
# and cluster-scoped resources) and needs to manage them wherever they land.
# When every manifest leancd will apply is namespaced and lives in a known set
# of namespaces, you can instead grant the same broad permissions only in those
# namespaces — via RoleBindings — so a compromise of leancd cannot touch other
# namespaces.
#
# This is a TEMPLATE:
#   1. leancd's own namespace (`leancd`) needs a RoleBinding for its state
#      ConfigMap. The one below covers it.
#   2. For each additional namespace leancd manages, copy the RoleBinding block
#      and set `metadata.namespace` to that namespace.
#   3. Adjust the NetworkPolicy egress destinations to match your environment
#      (Git host, OTLP collector, API server CIDR).
#
# Cluster-scoped resources (Namespace, ClusterRole/Binding, CRDs, etc.) still
# require a ClusterRoleBinding; if leancd must create those, keep a narrow
# ClusterRoleBinding for the specific cluster-scoped kinds instead.
apiVersion: v1
kind: Namespace
metadata:
  name: leancd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: leancd
  namespace: leancd
---
# The same broad ClusterRole as deploy/leancd.yaml: leancd applies arbitrary
# kinds. The difference below is that it is bound only to selected namespaces
# (RoleBindings), not cluster-wide (ClusterRoleBinding).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: leancd-namespaced
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
# Grant leancd its permissions in its own namespace (for the state ConfigMap
# and the reconcile-exclusion Lease — coordination.k8s.io/leases, which lock.rs
# creates/updates/deletes in this namespace).
# Copy this block for each additional target namespace, changing
# `metadata.namespace`.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: leancd
  namespace: leancd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: leancd-namespaced
subjects:
  - kind: ServiceAccount
    name: leancd
    namespace: leancd
---
# NetworkPolicy: leancd needs egress to (1) kube-dns for name resolution,
# (2) the Kubernetes API server, (3) the Git repository, and (4) the OTLP
# metrics collector. No ingress is needed (leancd exposes no HTTP listener).
#
# NetworkPolicy cannot select by FQDN, so Git/collector egress is expressed as
# IP ranges or namespaced services — tighten the ipBlock CIDRs to your actual
# Git host(s) and collector before applying.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: leancd-egress
  namespace: leancd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: leancd
  policyTypes:
    - Ingress
    - Egress
  ingress: [] # leancd exposes no inbound port
  egress:
    # DNS resolution (kube-dns in kube-system).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API server. The default Service is `kubernetes.default.svc`
    # (commonly 10.0.0.1); narrow the CIDR to your cluster's service CIDR.
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 443
    # Git (HTTPS 443 / SSH 22) and OTLP/HTTP collector (4318). Tighten the CIDR
    # to your Git host(s) and collector address before production use.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 22
        - protocol: TCP
          port: 4318
