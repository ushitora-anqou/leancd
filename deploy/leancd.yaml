# Kubernetes manifests for running leancd as a controller.
#
# Apply with:
#   kubectl apply -f deploy/leancd.yaml
#
# Metrics are exported over OTLP/HTTP (push) to an OpenTelemetry Collector.
# leancd runs no HTTP listener of its own. Point it at your collector with the
# standard `OTEL_EXPORTER_OTLP_*` env vars (endpoint/protocol set below; auth
# via `OTEL_EXPORTER_OTLP_HEADERS`). The collector is NOT deployed here — bring
# your own (e.g. the `otel/opentelemetry-collector` chart) and set
# `OTEL_EXPORTER_OTLP_ENDPOINT` to its OTLP/HTTP receiver.
#
# Git credentials are read from a Secret named `leancd-git-credentials`.
# For HTTPS basic auth, set GIT_USERNAME and GIT_PASSWORD. For SSH, set
# GIT_SSH_KEY to a PEM private key (the repo URL must be `git@host:...` or
# `ssh://...`). For a public repo the Secret may be omitted. Examples:
#   kubectl -n leancd create secret generic leancd-git-credentials \
#     --from-literal=GIT_USERNAME=<user> --from-literal=GIT_PASSWORD=<token>
#   kubectl -n leancd create secret generic leancd-git-credentials \
#     --from-file=GIT_SSH_KEY=$HOME/.ssh/id_ed25519
---
apiVersion: v1
kind: Namespace
metadata:
  name: leancd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: leancd
  namespace: leancd
---
# leancd applies arbitrary manifests (including CRDs and cluster-scoped
# resources), so it needs broad permissions. Narrow this in production to the
# resources/namespaces leancd should manage.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: leancd
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: leancd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: leancd
subjects:
  - kind: ServiceAccount
    name: leancd
    namespace: leancd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leancd
  namespace: leancd
  labels:
    app.kubernetes.io/name: leancd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: leancd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: leancd
    spec:
      serviceAccountName: leancd
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: leancd
          image: leancd:latest
          imagePullPolicy: IfNotPresent
          args: ["controller"]
          env:
            # --- non-secret configuration (command-line args via env) ---
            - name: LEANCD_REPO_URL
              value: "https://github.com/example/manifests.git"
            - name: LEANCD_BRANCH
              value: "main"
            - name: LEANCD_PATH
              value: "."
            - name: LEANCD_NAMESPACE
              value: "leancd"
            - name: LEANCD_POLL_INTERVAL
              value: "60s"
            - name: LEANCD_WORK_DIR
              value: "/tmp/leancd-work"
            # Reconcile-pass mutual exclusion: one pass at a time (cluster-wide)
            # via a coordination.k8s.io/lease. See lock.rs.
            - name: LEANCD_LOCK_LEASE_DURATION_SECS
              value: "60"
            - name: LEANCD_LOCK_WAIT_TIMEOUT_SECS
              value: "30"
            # --- metrics: OTLP/HTTP push to an OpenTelemetry Collector ---
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
          # --- secret configuration (only credentials, from a Secret) ---
          envFrom:
            - secretRef:
                name: leancd-git-credentials
                optional: true
          # Pod Security Standards "restricted": non-root, no privilege
          # escalation, all capabilities dropped, read-only root filesystem.
          # /tmp is an emptyDir so the shallow checkout and SSH-key temp file
          # stay writable under a read-only root.
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 65532
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # `leancd health` exec probe: exit 0=fresh, 1=never, 2=stale, 3=failing.
          livenessProbe:
            exec:
              command: ["leancd", "health"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["leancd", "health"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            # RSS stays minimal (see bench/); the limit leaves headroom.
            limits:
              memory: 128Mi
              cpu: 200m
            requests:
              memory: 32Mi
              cpu: 50m
      volumes:
        - name: tmp
          emptyDir: {}
