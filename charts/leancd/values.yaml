# Default values for the leancd Helm chart.
# leancd is a minimal, low-memory Kubernetes continuous-delivery controller
# that syncs plain YAML manifests from a Git repository into the cluster.

# --- Container image ---
image:
  # Published amd64 image on GHCR. The tag defaults to Chart.appVersion
  # (see templates/deployment.yaml); set image.tag explicitly to override.
  repository: ghcr.io/ushitora-anqou/leancd
  pullPolicy: IfNotPresent
  # Optional imagePullSecrets for a private / air-gapped registry.
  # pullSecrets:
  #   - name: my-registry-secret

# --- Namespace ---
namespace:
  create: true                    # create the Namespace, else reuse an existing one
  name: leancd

# --- ServiceAccount ---
serviceAccount:
  create: true                    # create the ServiceAccount, else reuse an existing one
  name: leancd

# --- RBAC ---
rbac:
  # false = ClusterRole + ClusterRoleBinding (deploy/leancd.yaml parity).
  # true  = ClusterRole(leancd-namespaced) + RoleBinding + NetworkPolicy
  #         (deploy/leancd-namespaced.yaml parity: bind permissions to the
  #         leancd namespace only, so a compromise cannot touch other namespaces).
  namespaced: false
  clusterRoleName: leancd
  namespacedClusterRoleName: leancd-namespaced

# --- NetworkPolicy ---
# Generated when `enabled` is true (default). It restricts egress to kube-dns,
# the API server, the Git host, and the OTLP collector, and denies ingress
# (leancd exposes no port). NetworkPolicy cannot select by FQDN, so tighten the
# CIDRs to your environment before production use. Generated in both RBAC modes.
networkPolicy:
  enabled: true                    # set false to skip the NetworkPolicy entirely
  kubeApiCidr: 10.0.0.0/8         # narrow to your cluster's service CIDR
  kubeApiPort: 443
  egressCidr: 0.0.0.0/0           # Git host(s) + OTLP collector; tighten before production
  gitPorts: [443, 22]
  otlpPort: 4318
  dns:
    namespace: kube-system
    podSelector:
      k8s-app: kube-dns
    port: 53

# --- Git credentials Secret ---
git:
  credentialsSecretName: leancd-git-credentials
  credentialsOptional: true       # envFrom.secretRef.optional (omit the Secret for public repos)

# --- leancd configuration (LEANCD_* env) ---
config:
  repoUrl: "https://github.com/example/manifests.git"
  branch: main
  path: "."
  namespace: leancd               # LEANCD_NAMESPACE: where leancd keeps its state ConfigMap + Lease
  pollInterval: 60s
  workDir: /tmp/leancd-work
  lockLeaseDurationSecs: "60"     # reconcile-pass mutual exclusion (Lease) — see lock.rs
  lockWaitTimeoutSecs: "30"
  cacheMaxObjectBytes: "12288"    # in `cache` watch mode, max serialized bytes of an object cached in full (SmallTier); larger → key-only (LargeTier) + per-GVK List drift fallback. Size-based, any kind. See watch.rs.

# --- Metrics (OTEL_* env) ---
# leancd runs no HTTP listener; it pushes metrics over OTLP/HTTP to a collector
# you bring yourself (e.g. the otel/opentelemetry-collector chart).
metrics:
  otlpEndpoint: "http://otel-collector:4318"
  otlpProtocol: http/protobuf

# --- Resources (RSS stays minimal; the limit leaves headroom — see bench/) ---
resources:
  limits:
    memory: 128Mi
    cpu: 200m
  requests:
    memory: 32Mi
    cpu: 50m

# --- Grafana dashboard ConfigMap ---
dashboards:
  enabled: true                   # ship the Grafana dashboard as a ConfigMap labelled grafana_dashboard
  configMapName: leancd-grafana-dashboard
  label: grafana_dashboard        # kiwigrid sidecar autodiscovery key

# --- Extra env (appended after the above; last wins, so any LEANCD_*/OTEL_* can be overridden) ---
extraEnv: []
  # - name: OTEL_METRIC_EXPORT_INTERVAL
  #   value: "5000"

# --- Deployment common ---
replicaCount: 1
strategy: Recreate
terminationGracePeriodSeconds: 30
args: ["controller"]

# --- Pod Security (PSS "restricted"; defaults match deploy/leancd.yaml) ---
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsUser: 65532
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# --- Probes (`leancd health`: exit 0=fresh, 1=never, 2=stale, 3=failing) ---
# A startup probe so a slow first run (large repo clone, CRD discovery) is not
# killed by liveness before it can report healthy; it hands off to liveness.
startupProbe:
  exec:
    command: ["leancd", "health"]
  periodSeconds: 10
  failureThreshold: 30            # up to ~5 min for the initial git clone
livenessProbe:
  exec:
    command: ["leancd", "health"]
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3
readinessProbe:
  exec:
    command: ["leancd", "health"]
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# --- emptyDir /tmp (shallow checkout + SSH-key temp file stay writable under a read-only root) ---
tmpVolume:
  enabled: true

# --- PodDisruptionBudget ---
# A single-replica Deployment is protected from voluntary eviction (node drains,
# cluster-autoscaler) when minAvailable: 1. Disable only if you run >1 replica.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# --- PriorityClass (optional) ---
# A high priority keeps the controller from being evicted under node pressure.
# Disabled by default; opt in on production clusters. `value` is the priority
# (higher = more important; `system-node-critical` is 2000000000).
priorityClass:
  enabled: false
  name: leancd-critical
  value: 1000000
