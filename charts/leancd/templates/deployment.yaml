apiVersion: apps/v1
kind: Deployment
metadata:
  name: leancd
  namespace: {{ include "leancd.namespace" . }}
  labels:
    {{- include "leancd.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy }}
  selector:
    matchLabels:
      {{- include "leancd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "leancd.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "leancd.serviceAccountName" . }}
      {{- if .Values.priorityClass.enabled }}
      priorityClassName: {{ .Values.priorityClass.name }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: leancd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          env:
            # --- non-secret configuration (command-line args via env) ---
            - name: LEANCD_REPO_URL
              value: {{ .Values.config.repoUrl | quote }}
            - name: LEANCD_BRANCH
              value: {{ .Values.config.branch | quote }}
            - name: LEANCD_PATH
              value: {{ .Values.config.path | quote }}
            - name: LEANCD_NAMESPACE
              value: {{ .Values.config.namespace | quote }}
            - name: LEANCD_POLL_INTERVAL
              value: {{ .Values.config.pollInterval | quote }}
            - name: LEANCD_WORK_DIR
              value: {{ .Values.config.workDir | quote }}
            # Reconcile-pass mutual exclusion: one pass at a time (cluster-wide)
            # via a coordination.k8s.io/lease. See lock.rs.
            - name: LEANCD_LOCK_LEASE_DURATION_SECS
              value: {{ .Values.config.lockLeaseDurationSecs | quote }}
            - name: LEANCD_LOCK_WAIT_TIMEOUT_SECS
              value: {{ .Values.config.lockWaitTimeoutSecs | quote }}
            # In `cache` watch mode, max serialized bytes of an object cached in
            # full (SmallTier); larger objects are tracked by key only and
            # drift-checked via a per-GVK List. Size-based, any kind. See watch.rs.
            - name: LEANCD_CACHE_MAX_OBJECT_BYTES
              value: {{ .Values.config.cacheMaxObjectBytes | quote }}
            # How cluster-side drift wakes the loop: off | trigger | cache (default).
            # See watch.rs and --watch-debounce.
            - name: LEANCD_WATCH_MODE
              value: {{ .Values.config.watchMode | quote }}
            - name: LEANCD_WATCH_DEBOUNCE
              value: {{ .Values.config.watchDebounce | quote }}
            # Argo CD-style resource health: on (default) | off (skips it + its metric).
            - name: LEANCD_HEALTH_MODE
              value: {{ .Values.config.healthMode | quote }}
            - name: LEANCD_HEALTH_STALE_FACTOR
              value: {{ .Values.config.healthStaleFactor | quote }}
            # Per Job/Pod hook completion timeout before it is treated as failed.
            - name: LEANCD_HOOK_TIMEOUT_SECS
              value: {{ .Values.config.hookTimeoutSecs | quote }}
            # Exponential backoff on consecutive sync failures (resets to pollInterval on success).
            - name: LEANCD_BACKOFF_BASE
              value: {{ .Values.config.backoffBase | quote }}
            - name: LEANCD_BACKOFF_MAX
              value: {{ .Values.config.backoffMax | quote }}
            # Grace for the in-flight pass on SIGTERM (≤ terminationGracePeriodSeconds).
            - name: LEANCD_SHUTDOWN_TIMEOUT_SECS
              value: {{ .Values.config.shutdownTimeoutSecs | quote }}
            # --- metrics: OTLP/HTTP push to an OpenTelemetry Collector ---
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.metrics.otlpEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.metrics.otlpProtocol | quote }}
            # --- extra/override env (appended last; last value wins) ---
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # --- secret configuration (only credentials, from a Secret) ---
          envFrom:
            - secretRef:
                name: {{ .Values.git.credentialsSecretName }}
                optional: {{ .Values.git.credentialsOptional }}
          # Pod Security Standards "restricted": non-root, no privilege
          # escalation, all capabilities dropped, read-only root filesystem.
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          # `leancd health` exec probe: exit 0=fresh, 1=never, 2=stale, 3=failing.
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- if .Values.tmpVolume.enabled }}
          # /tmp is an emptyDir so the shallow checkout and SSH-key temp file
          # stay writable under a read-only root.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.tmpVolume.enabled }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- end }}
