# Continuous integration via Nix. Two parallel jobs, both on push (master) and
# pull_request:
#
#   check — `nix flake check` (== make test): the canonical gate. Covers fmt
#           (cargo + taplo, fail on diff), clippy (-D warnings), nextest,
#           cargo-deny (licenses/supply chain), cargo-audit (advisories), build.
#           Runs Nix directly; no devShell needed.
#   e2e   — `make e2e` inside the flake devShell, against a host Docker + kind
#           cluster with in-cluster Forgejo + leancd. The devShell (non-pure)
#           supplies cargo/kind/kubectl/curl; Docker and git come from the host.
#
# The toolchain comes entirely from Nix (no per-language setup). Nix is installed
# with DeterminateSystems/nix-installer-action, the Nix store is cached with
# nix-community/cache-nix-action, and the e2e job enters the devShell with
# nicknovitski/nix-develop.
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    name: nix flake check (fmt / clippy / test / deny / audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes: |
            nix-${{ runner.os }}-

      - name: nix flake check (== make test)
        run: nix flake check

  e2e:
    name: e2e (kind + in-cluster Forgejo + leancd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes: |
            nix-${{ runner.os }}-

      - name: Enter flake devShell
        uses: nicknovitski/nix-develop@v1

      - name: End-to-end tests
        run: make e2e
