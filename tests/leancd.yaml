# Ephemeral in-cluster leancd + OpenTelemetry Collector for the e2e suite.
#
# leancd runs as a Deployment with a 1h poll interval so it stays dormant during
# scenarios that drive sync/status via `kubectl exec` — it is the exec host for
# `leancd sync`/`leancd status`. Scenarios that need an actively-polling
# controller (drift self-heal, controller polling) spin up their own short-lived
# controller Deployment/Job.
#
# leancd exposes no HTTP endpoint; it pushes metrics over OTLP/HTTP to the
# in-cluster OTel Collector, which re-exports them as Prometheus text on :8888
# for the metrics scenario to read over a port-forward.
#
# Git credentials come from the leancd-git-credentials Secret (HTTPS basic
# auth against the in-cluster Forgejo). The repo points at an auto-initialised
# `controller-idle` repo so the controller's first reconcile succeeds without
# touching any scenario's state.
apiVersion: v1
kind: Namespace
metadata:
  name: leancd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: leancd
  namespace: leancd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: leancd-e2e
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: leancd-e2e
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: leancd-e2e
subjects:
  - kind: ServiceAccount
    name: leancd
    namespace: leancd
---
apiVersion: v1
kind: Secret
metadata:
  name: leancd-git-credentials
  namespace: leancd
type: Opaque
stringData:
  GIT_USERNAME: leancd
  GIT_PASSWORD: leancd-e2e-pass
---
# OTel Collector config: accept OTLP/HTTP on :4318, re-export as Prometheus on
# :8888 for the metrics scenario. The core distribution covers both. Pin a
# recent release; bump as needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector
  namespace: leancd
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
        resource_to_telemetry_conversion:
          enabled: true
    service:
      pipelines:
        metrics:
          receivers: [otlp]
          exporters: [prometheus]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: leancd
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector:0.118.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - name: otlp-http
              containerPort: 4318
            - name: prom
              containerPort: 8889
          volumeMounts:
            - name: config
              mountPath: /etc/otel
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: leancd
spec:
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: prom
      port: 8889
      targetPort: prom
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leancd
  namespace: leancd
  labels:
    app.kubernetes.io/name: leancd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: leancd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: leancd
    spec:
      serviceAccountName: leancd
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: leancd
          image: leancd:latest
          imagePullPolicy: IfNotPresent
          args: ["controller"]
          env:
            - name: LEANCD_REPO_URL
              value: http://forgejo.forgejo.svc.cluster.local:3000/leancd/controller-idle.git
            - name: LEANCD_BRANCH
              value: main
            - name: LEANCD_PATH
              value: "."
            - name: LEANCD_POLL_INTERVAL
              value: 1h
            - name: LEANCD_NAMESPACE
              value: leancd
            - name: LEANCD_WORK_DIR
              value: /tmp/leancd-work
            # Push metrics over OTLP/HTTP to the in-cluster collector.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            # Export every 5s so the metrics scenario sees fresh data quickly.
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "5000"
          envFrom:
            - secretRef:
                name: leancd-git-credentials
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 65532
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            exec:
              command: ["leancd", "health"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["leancd", "health"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
